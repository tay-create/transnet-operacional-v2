version: "3.9"

services:
  app:
    image: ghcr.io/tay-create/transnet-operacional-v2:staging
    container_name: transnet-staging
    restart: unless-stopped
    ports:
      - "3002:3001"
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transnet-staging-net

  db:
    image: postgres:16-alpine
    container_name: transnet-db-staging
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=America/Sao_Paulo
    env_file:
      - .env.staging
    volumes:
      - transnet-db-staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transnet-staging-net

networks:
  transnet-staging-net:
    driver: bridge

volumes:
  transnet-db-staging:
    driver: local