version: "3.9"

services:
  app:
    image: ghcr.io/tay-create/transnet-operacional-v2:latest
    container_name: transnet-prod
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transnet-prod-net

  db:
    image: postgres:16-alpine
    container_name: transnet-db-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - transnet-db-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transnet-prod-net

networks:
  transnet-prod-net:
    driver: bridge

volumes:
  transnet-db-prod:
    driver: local
