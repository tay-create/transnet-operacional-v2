name: Deploy — Produção (main)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tay-create/transnet-operacional-v2

jobs:
  build-and-push:
    name: Build e Push da imagem Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem (tag latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy no servidor de Produção
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Escrever .env.prod
        run: |
          mkdir -p /opt/transnet/prod
          printf 'JWT_SECRET=%s\nPORT=3001\nMAX_FILE_SIZE=200mb\nNODE_ENV=production\nGENERATE_SOURCEMAP=false\nDB_USER=%s\nDB_HOST=db\nDB_NAME=transnet_prod\nDB_PASSWORD=%s\nDB_PORT=5432\nPOSTGRES_USER=%s\nPOSTGRES_PASSWORD=%s\nPOSTGRES_DB=transnet_prod\nFRONTEND_URL=https://portal.tnethub.com.br\nGMAIL_USER=%s\nGMAIL_APP_PASSWORD=%s\nADMIN_MASTER_PASSWORD=%s\n' \
            '${{ secrets.PROD_JWT_SECRET }}' \
            '${{ secrets.PROD_DB_USER }}' \
            '${{ secrets.PROD_DB_PASSWORD }}' \
            '${{ secrets.PROD_DB_USER }}' \
            '${{ secrets.PROD_DB_PASSWORD }}' \
            '${{ secrets.GMAIL_USER }}' \
            '${{ secrets.GMAIL_APP_PASSWORD }}' \
            '${{ secrets.PROD_ADMIN_PASSWORD }}' \
            > /opt/transnet/prod/.env.prod

      - name: Copiar docker-compose.prod.yml
        run: cp ${{ github.workspace }}/docker-compose.prod.yml /opt/transnet/prod/

      - name: Deploy via Docker Compose
        run: |
          # Para o PM2 se ainda estiver rodando (migração para Docker)
          pm2 stop transnet 2>/dev/null || true
          cd /opt/transnet/prod
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -f docker-compose.prod.yml --env-file .env.prod pull app
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d db
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps app
          docker image prune -f
