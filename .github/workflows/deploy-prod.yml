name: Deploy — Produção (main)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tay-create/transnet-operacional-v2

jobs:
  build-and-push:
    name: Build e Push da imagem Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem (tag latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy no servidor de Produção
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Escrever .env.prod no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          proxy_host: ssh.tnethub.com.br
          proxy_username: ${{ secrets.PROD_USER }}
          proxy_key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            mkdir -p /opt/transnet/prod
            cat > /opt/transnet/prod/.env.prod << 'ENVEOF'
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            PORT=3001
            MAX_FILE_SIZE=200mb
            NODE_ENV=production
            GENERATE_SOURCEMAP=false
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_HOST=db
            DB_NAME=transnet_prod
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            DB_PORT=5432
            FRONTEND_URL=https://portal.tnethub.com.br
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            ADMIN_MASTER_PASSWORD=${{ secrets.PROD_ADMIN_PASSWORD }}
            ENVEOF

      - name: Copiar docker-compose.prod.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          proxy_host: ssh.tnethub.com.br
          proxy_username: ${{ secrets.PROD_USER }}
          proxy_key: ${{ secrets.PROD_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/transnet/prod/

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          proxy_host: ssh.tnethub.com.br
          proxy_username: ${{ secrets.PROD_USER }}
          proxy_key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/transnet/prod
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            docker image prune -f
