name: Deploy — Homologação (develop)

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tay-create/transnet-operacional-v2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build e Push da imagem Docker (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem (tag staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

  deploy:
    name: Deploy no servidor de Homologação
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Escrever .env.staging
        run: |
          mkdir -p /opt/transnet/staging
          printf 'JWT_SECRET=%s\nPORT=3001\nMAX_FILE_SIZE=200mb\nNODE_ENV=production\nGENERATE_SOURCEMAP=false\nDB_USER=%s\nDB_HOST=db\nDB_NAME=transnet_staging\nDB_PASSWORD=%s\nDB_PORT=5432\nFRONTEND_URL=https://homolog.tnethub.com.br\nGMAIL_USER=%s\nGMAIL_APP_PASSWORD=%s\nADMIN_MASTER_PASSWORD=%s\nGOOGLE_SERVICE_ACCOUNT_JSON=%s\nSHEETS_PORCELANA_ID=%s\nSHEETS_PORCELANA_RANGE=Embarques!A1:AJ500\n' \
            '${{ secrets.STAGING_JWT_SECRET }}' \
            '${{ secrets.STAGING_DB_USER }}' \
            '${{ secrets.STAGING_DB_PASSWORD }}' \
            '${{ secrets.GMAIL_USER }}' \
            '${{ secrets.GMAIL_APP_PASSWORD }}' \
            '${{ secrets.STAGING_ADMIN_PASSWORD }}' \
            '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' \
            '${{ secrets.SHEETS_PORCELANA_ID }}' \
            > /opt/transnet/staging/.env.staging

      - name: Copiar docker-compose.staging.yml
        run: cp ${{ github.workspace }}/docker-compose.staging.yml /opt/transnet/staging/

      - name: Deploy via Docker Compose
        run: |
          cd /opt/transnet/staging
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -p staging -f docker-compose.staging.yml --env-file .env.staging pull app
          docker compose -p staging -f docker-compose.staging.yml --env-file .env.staging up -d db
          docker compose -p staging -f docker-compose.staging.yml --env-file .env.staging up -d --no-deps app
          docker image prune -f
