name: Deploy — Homologação (develop)

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tay-create/transnet-operacional-v2

jobs:
  build-and-push:
    name: Build e Push da imagem Docker (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem (tag staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

  deploy:
    name: Deploy no servidor de Homologação
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Escrever .env.staging
        run: |
          mkdir -p /opt/transnet/staging
          cat > /opt/transnet/staging/.env.staging << 'ENVEOF'
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          PORT=3001
          MAX_FILE_SIZE=200mb
          NODE_ENV=production
          GENERATE_SOURCEMAP=false
          DB_USER=${{ secrets.STAGING_DB_USER }}
          DB_HOST=db
          DB_NAME=transnet_staging
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          DB_PORT=5432
          FRONTEND_URL=https://homolog.tnethub.com.br
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_MASTER_PASSWORD=${{ secrets.STAGING_ADMIN_PASSWORD }}
          ENVEOF

      - name: Copiar docker-compose.staging.yml
        run: cp ${{ github.workspace }}/docker-compose.staging.yml /opt/transnet/staging/

      - name: Deploy via Docker Compose
        run: |
          cd /opt/transnet/staging
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -f docker-compose.staging.yml pull app
          docker compose -f docker-compose.staging.yml up -d --no-deps app
          docker image prune -f
